<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090a12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="寶石方塊" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/gem-icon.svg" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2311d6a0' d='M32 3 58 22 44 61H20L6 22z'/%3E%3Cpath fill='%23fff7d8' fill-opacity='.72' d='M32 3 44 22 32 61 20 22z'/%3E%3C/svg%3E" />
    <title>寶石方塊</title>
  </head>
  <body>
    <main id="app">
      <section id="hud" aria-label="遊戲狀態">
        <div class="status-strip">
          <div class="stat">
            <span class="label">關</span>
            <span id="ui-level" class="value">1</span>
          </div>
          <div class="stat score">
            <span class="label">分</span>
            <span id="ui-score" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">時</span>
            <span id="ui-time" class="value">2:30</span>
          </div>
        </div>

        <div id="progress-panel" aria-label="本關進度">
          <div class="progress-top">
            <div class="tier-chip">
              <span class="label">寶石</span>
              <span id="ui-tier" class="tier-name">經典切面</span>
            </div>
            <strong id="ui-target">0 / 1300</strong>
          </div>
          <div class="progress-track"><div id="ui-progress"></div></div>
          <div class="best">
            <span>最佳</span>
            <span id="ui-best">0 / Lv.1</span>
          </div>
        </div>
      </section>

      <section id="game-wrap">
        <div id="game"></div>
        <div id="combo-toast" aria-live="polite"></div>
      </section>

      <section id="controls" aria-label="控制列">
        <button id="hint-btn" class="control-btn" type="button" aria-label="提示" title="提示">
          <span class="control-icon" aria-hidden="true">?</span>
          <span class="sr-only">提示</span>
        </button>
        <button id="shuffle-btn" class="control-btn" type="button" aria-label="洗牌，剩餘 3 次" title="洗牌">
          <span class="control-icon" aria-hidden="true">↻</span>
          <span id="ui-shuffle-count" class="control-count" aria-hidden="true">x3</span>
          <span class="sr-only">洗牌</span>
        </button>
        <button id="pause-btn" class="control-btn" type="button" aria-label="暫停" title="暫停">
          <span class="control-icon" aria-hidden="true">Ⅱ</span>
          <span class="sr-only">暫停</span>
        </button>
        <button id="sound-btn" class="control-btn sound-btn" type="button" aria-label="音樂開啟" aria-pressed="true" title="音樂">
          <span id="ui-sound-icon" class="control-icon sound-icon" aria-hidden="true">♪</span>
          <span class="sr-only">音樂</span>
        </button>
      </section>

      <section id="overlay" class="overlay">
        <div class="overlay-card">
          <p class="eyebrow">Gem Blocks</p>
          <h1 id="overlay-title">寶石方塊</h1>
          <p id="overlay-text">交換相鄰寶石，湊三連以上消除。關卡越高，礦脈會出現更稀有的寶石。</p>
          <div id="overlay-big" class="overlay-big hidden"></div>
          <button id="overlay-button" type="button">開始開採</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
