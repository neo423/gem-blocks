<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2311d6a0' d='M32 3 58 22 44 61H20L6 22z'/%3E%3Cpath fill='%23fff7d8' fill-opacity='.72' d='M32 3 44 22 32 61 20 22z'/%3E%3C/svg%3E" />
    <title>寶石方塊</title>
  </head>
  <body>
    <main id="app">
      <section id="hud" aria-label="遊戲狀態">
        <div class="stat">
          <span class="label">關卡</span>
          <span id="ui-level" class="value">1</span>
        </div>
        <div class="stat score">
          <span class="label">總分</span>
          <span id="ui-score" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">時間</span>
          <span id="ui-time" class="value">2:30</span>
        </div>
        <div class="stat wide">
          <span class="label">寶石系列</span>
          <span id="ui-tier" class="value">經典切面</span>
        </div>
      </section>

      <section id="progress-panel" aria-label="關卡進度">
        <div class="progress-copy">
          <span>本關進度</span>
          <strong id="ui-target">0 / 1300</strong>
        </div>
        <div class="progress-track"><div id="ui-progress"></div></div>
        <div class="best">最佳紀錄 <span id="ui-best">0 / Lv.1</span></div>
      </section>

      <section id="game-wrap">
        <div id="game"></div>
        <div id="combo-toast" aria-live="polite"></div>
      </section>

      <section id="controls" aria-label="控制列">
        <button id="hint-btn" type="button">提示</button>
        <button id="shuffle-btn" type="button">洗牌 x3</button>
        <button id="pause-btn" type="button">暫停</button>
        <button id="sound-btn" type="button" aria-pressed="true">音樂 開</button>
      </section>

      <section id="overlay" class="overlay">
        <div class="overlay-card">
          <p class="eyebrow">Gem Blocks</p>
          <h1 id="overlay-title">寶石方塊</h1>
          <p id="overlay-text">交換相鄰寶石，湊三連以上消除。</p>
          <div id="overlay-big" class="overlay-big hidden"></div>
          <button id="overlay-button" type="button">開始開採</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
