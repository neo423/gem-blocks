<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#159ed9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/assets/gem-blocks-app-icon.png" />
    <link rel="icon" type="image/png" href="/assets/gem-blocks-app-icon.png" />
    <title>寶石方塊</title>
  </head>
  <body>
    <main id="app" class="game-shell">
      <section id="hud" class="top-hud" aria-label="遊戲狀態">
        <div class="brand-timer-panel">
          <img class="game-logo" src="/assets/gem-blocks-logo.png" alt="寶石方塊" />
          <div class="timer-well">
            <span class="timer-label">剩餘時間</span>
            <span id="ui-time" class="hud-main-timer">2:30</span>
          </div>
        </div>

        <div class="hud-data-panel">
          <div class="hud-stats-row">
            <div class="hud-stat-card">
              <span class="hud-stat-label">關卡</span>
              <span id="ui-level" class="hud-stat-value">1</span>
            </div>
            <div class="hud-stat-card score-stat">
              <span class="hud-stat-label">分數</span>
              <span id="ui-score" class="hud-stat-value">0</span>
            </div>
            <div class="hud-stat-card">
              <span class="hud-stat-label">目標</span>
              <span id="ui-target-value" class="hud-stat-value">1300</span>
            </div>
          </div>

          <div id="progress-panel" class="hud-info-panel" aria-label="關卡進度">
            <div class="hud-info-row">
              <span>寶石 <strong id="ui-tier">經典切面</strong></span>
              <strong id="ui-target">0 / 1300</strong>
            </div>
            <div class="progress-track"><div id="ui-progress"></div></div>
            <div class="hud-info-row best-row"><span>最佳紀錄</span><span id="ui-best">0 / Lv.1</span></div>
          </div>
        </div>
      </section>

      <section class="gem-legend" aria-label="下一批寶石">
        <span class="legend-gem" data-preview-slot="0" data-gem="0"></span>
        <span class="legend-gem" data-preview-slot="1" data-gem="1"></span>
        <span class="legend-gem" data-preview-slot="2" data-gem="2"></span>
        <span class="legend-gem" data-preview-slot="3" data-gem="3"></span>
        <span class="legend-gem" data-preview-slot="4" data-gem="4"></span>
        <span class="legend-gem" data-preview-slot="5" data-gem="5"></span>
      </section>

      <section id="game-wrap" class="board-frame" aria-label="寶石棋盤">
        <div id="game"></div>
        <div id="combo-toast" aria-live="polite"></div>
      </section>

      <section id="controls" class="bottom-controls" aria-label="控制列">
        <button id="hint-btn" class="control-button" type="button"><span id="hint-label" class="control-label">提示</span></button>
        <button id="shuffle-btn" class="control-button" type="button"><span id="shuffle-label" class="control-label">洗牌 x3</span></button>
        <button id="pause-btn" class="control-button" type="button"><span id="pause-label" class="control-label">暫停</span></button>
        <button id="sound-btn" class="control-button" type="button" aria-pressed="true"><span id="sound-label" class="control-label">音樂 開</span></button>
      </section>

      <section id="overlay" class="overlay" data-mode="menu">
        <div class="overlay-card">
          <img class="overlay-logo" src="/assets/gem-blocks-logo.png" alt="寶石方塊" />
          <h1 id="overlay-title">寶石方塊</h1>
          <p id="overlay-text">交換相鄰寶石，湊三連以上消除。</p>
          <div id="overlay-big" class="overlay-big hidden"></div>
          <div class="menu-actions">
            <button id="overlay-button" type="button">開始遊戲</button>
            <button id="rules-button" type="button">遊戲規則</button>
          </div>
        </div>
        <section id="rules-panel" class="rules-panel hidden" role="dialog" aria-modal="true" aria-labelledby="rules-title">
          <div class="rules-card">
            <h2 id="rules-title">遊戲規則</h2>
            <ul>
              <li>交換相鄰寶石，連成三顆以上即可消除。</li>
              <li>在 2 分 30 秒內達成本關目標分數。</li>
              <li>連鎖消除與一次消除更多寶石可獲得更高分。</li>
              <li>四顆連線會進化方向寶石，五顆連線會進化終極星鑽。</li>
              <li>將終極星鑽與任一顏色交換，可消除全場同色寶石。</li>
              <li>找不到步數時，每局可使用三次洗牌。</li>
            </ul>
            <button id="rules-close" type="button">返回</button>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
